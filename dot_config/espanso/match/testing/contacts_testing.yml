# Espanso Match File

# https://espanso.org/docs/matches/examples/#regex-for-categorizing-your-matches

matches:
  # Dallas Elliott
  - regex: "(contact|ct)(all|n)(all|de)" # Contact Category - Name Subcategory - Dallas Elliott
    replace: "Dallas Elliott"

  - regex: "(contact|ct)(all|e)(all|de)" # Contact Category - Email Subcategory - Dallas Elliott
    label: Dallas Elliott Email
    replace: "dallas.elliott@deeptree.tech"

  - regex: "(contact|ct)(all|p)(all|de)" # Contact Category - Phone Subcategory - Dallas Elliott
    replace: "406.750.3059"

    ###########################################################################

  # John Stuart
  - regex: "(contact|ct)(all|n)(all|js)" # Contact Category - Name Subcategory - John Stuart
    replace: "John Stuart"

  - regex: "(contact|ct)(all|e)(all|js)" # Contact Category - Email Subcategory - John Stuart
    replace: "john.stuart@example.com"

  - regex: "(contact|ct)(all|p)(all|de)" # Contact Category - Phone Subcategory - John Stuart
    replace: "123.456.7890"
