gui:
  sidePanels:
    - [status, stash]
    - [files, worktrees, submodules]
    - [branches, remotes, tags]
    - [commits, reflog]
  theme:
    activeBorderColor:
      - "#a6e3a1"
      - bold
    inactiveBorderColor:
      - "#7f849c"
    searchingActiveBorderColor:
      - bold
      - "#89dceb"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - reverse
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitFgColor:
      - "#89b4fa"
    cherryPickedCommitBgColor:
      - "#89dceb"
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
  showListFooter: true
  showCommandLog: false
  authorColors:
    "iop098321qwe": "#89dceb"
    "Dallas Elliott": "#89dceb"
  branchColorPatterns:
    "^(docs|chore)/": "#94e2d5" # use a deep blue for branches beginning with 'docs/'
    'issue-\d+': "#f5e0dc" # use a orange for branches containing 'issue-<some-number>'
    "^feature/": "#f5c2e7" # use a pink for branches starting with 'feature/'
    "^bugfix/": "#fab387" # use a maroon for branches starting with 'bugfix/'
    "^release/": "#74c7ec" # use an electric blue for branches starting with 'release/'
    "^hotfix/": "#f38ba8" # use a red for branches starting with 'hotfix/'
    "^support/": "#f9e2af" # use a yellow for branches starting with 'support/'
    "^main+": "#a6e3a1" # use a lime green for the main branch
    "^develop+": "#89b4fa" # use a purple for the develop branch
  nerdFontsVersion: "3"
  showFileIcons: true
  showBranchCommitHash: false
  showDivergenceFromBaseBranch: arrowAndNumber
  statusPanelView: allBranchesLog
  sidePanelWidth: 0.3333
  expandFocusedSidePanel: true
  expandedSidePanelWeight: 2
  shrinkSidePanelsToContent: true
  spinner:
    frames:
      - "⠋"
      - "⠙"
      - "⠹"
      - "⠸"
      - "⠼"
      - "⠴"
      - "⠦"
      - "⠧"
      - "⠇"
      - "⠏"
    rate: 80

os:
  shellFunctionsFile: ~/.custom_bash_commands.sh

git:
  pagers:
    - colorArg: always
      pager: 'delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"'
  commit:
    autoWrapWidth: 80

customCommands:
  - key: "I"
    context: "global"
    command: 'git commit --allow-empty -m "chore: initial commit"'
    description: "Create empty initial commit"
    loadingText: "Creating empty commit..."
    prompts:
      - type: "confirm"
        title: "Create Empty Commit"
        body: 'Are you sure you want to create an empty commit with message "chore: initial commit"?'
